<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株価チェッカー</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2980b9 0%, #3498db 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5em;
            font-weight: 300;
        }

        .search-section {
            padding: 30px;
            background: #f8f9fa;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #3498db;
        }

        .btn {
            padding: 15px 30px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #2980b9;
        }

        .btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        .popular-stocks {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .stock-button {
            padding: 15px;
            background: white;
            border: 2px solid #ecf0f1;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .stock-button:hover {
            border-color: #3498db;
            transform: translateY(-2px);
        }

        .results {
            padding: 30px;
            display: none;
        }

        .stock-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 5px solid #3498db;
        }

        .stock-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .stock-price {
            font-size: 2em;
            font-weight: bold;
            color: #27ae60;
            margin-bottom: 10px;
        }

        .stock-change {
            font-size: 1.2em;
            font-weight: bold;
        }

        .positive {
            color: #27ae60;
        }

        .negative {
            color: #e74c3c;
        }

        .loading {
            text-align: center;
            padding: 20px;
            font-size: 1.2em;
            color: #7f8c8d;
        }

        .error {
            background: #e74c3c;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 株価チェッカー</h1>
            <p>リアルタイムで株価情報をチェック</p>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="stockInput" placeholder="銘柄コードを入力 (例: 7203, AAPL)" />
                <button class="btn" onclick="searchStock()">検索</button>
            </div>

            <h3>人気銘柄</h3>
            <div class="popular-stocks">
                <div class="stock-button" onclick="searchPopularStock('7203.T')">
                    <strong>トヨタ自動車</strong><br>
                    <small>7203</small>
                </div>
                <div class="stock-button" onclick="searchPopularStock('9984.T')">
                    <strong>ソフトバンク</strong><br>
                    <small>9984</small>
                </div>
                <div class="stock-button" onclick="searchPopularStock('6758.T')">
                    <strong>ソニー</strong><br>
                    <small>6758</small>
                </div>
                <div class="stock-button" onclick="searchPopularStock('9983.T')">
                    <strong>ファーストリテイリング</strong><br>
                    <small>9983</small>
                </div>
                <div class="stock-button" onclick="searchPopularStock('AAPL')">
                    <strong>Apple</strong><br>
                    <small>AAPL</small>
                </div>
                <div class="stock-button" onclick="searchPopularStock('GOOGL')">
                    <strong>Google</strong><br>
                    <small>GOOGL</small>
                </div>
            </div>
        </div>

        <div id="results" class="results"></div>
    </div>

    <script>
        async function searchStock() {
            const stockInput = document.getElementById('stockInput');
            const symbol = stockInput.value.trim().toUpperCase();
            
            if (!symbol) {
                alert('銘柄コードを入力してください');
                return;
            }

            await fetchStockData(symbol);
        }

        async function searchPopularStock(symbol) {
            await fetchStockData(symbol);
        }

        async function fetchStockData(symbol) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.style.display = 'block';
            resultsDiv.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>株価情報を取得中...</p>
                </div>
            `;

            try {
                // Yahoo Finance APIの代替として、無料のFinnhub APIを使用
                const API_KEY = 'demo'; // デモ用キー（実際の使用では有効なAPIキーが必要）
                
                // 日本株の場合、シンボルに.Tが含まれている場合は削除してから検索
                let searchSymbol = symbol;
                if (symbol.includes('.T')) {
                    searchSymbol = symbol.replace('.T', '');
                }

                const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${searchSymbol}&token=${API_KEY}`);
                
                if (!response.ok) {
                    throw new Error('データの取得に失敗しました');
                }

                const data = await response.json();

                if (data.c === 0) {
                    // デモデータを表示（APIの制限のため）
                    displayDemoData(symbol);
                } else {
                    displayStockData(symbol, data);
                }

            } catch (error) {
                console.error('Error:', error);
                displayDemoData(symbol);
            }
        }

        function displayStockData(symbol, data) {
            const resultsDiv = document.getElementById('results');
            const currentPrice = data.c;
            const change = data.d;
            const changePercent = data.dp;
            
            const changeClass = change >= 0 ? 'positive' : 'negative';
            const changeSymbol = change >= 0 ? '+' : '';

            resultsDiv.innerHTML = `
                <div class="stock-card">
                    <div class="stock-name">${getStockName(symbol)}</div>
                    <div class="stock-price">$${currentPrice.toFixed(2)}</div>
                    <div class="stock-change ${changeClass}">
                        ${changeSymbol}${change.toFixed(2)} (${changeSymbol}${changePercent.toFixed(2)}%)
                    </div>
                    <p><small>※ リアルタイムデータ</small></p>
                </div>
            `;
        }

        function displayDemoData(symbol) {
            const resultsDiv = document.getElementById('results');
            const demoData = getDemoData(symbol);
            
            const changeClass = demoData.change >= 0 ? 'positive' : 'negative';
            const changeSymbol = demoData.change >= 0 ? '+' : '';

            resultsDiv.innerHTML = `
                <div class="stock-card">
                    <div class="stock-name">${demoData.name}</div>
                    <div class="stock-price">${demoData.currency}${demoData.price.toLocaleString()}</div>
                    <div class="stock-change ${changeClass}">
                        ${changeSymbol}${demoData.change} (${changeSymbol}${demoData.changePercent}%)
                    </div>
                    <p><small>※ デモデータです</small></p>
                </div>
            `;
        }

        function getDemoData(symbol) {
            const demoStocks = {
                '7203.T': { name: 'トヨタ自動車 (7203)', price: 2450, change: 25, changePercent: '1.03', currency: '¥' },
                '9984.T': { name: 'ソフトバンクグループ (9984)', price: 5890, change: -45, changePercent: '-0.76', currency: '¥' },
                '6758.T': { name: 'ソニーグループ (6758)', price: 12500, change: 180, changePercent: '1.46', currency: '¥' },
                '9983.T': { name: 'ファーストリテイリング (9983)', price: 89400, change: -1200, changePercent: '-1.32', currency: '¥' },
                'AAPL': { name: 'Apple Inc. (AAPL)', price: 175.43, change: 2.15, changePercent: '1.24', currency: '$' },
                'GOOGL': { name: 'Alphabet Inc. (GOOGL)', price: 142.56, change: -1.23, changePercent: '-0.85', currency: '$' }
            };

            return demoStocks[symbol] || { 
                name: `${symbol}`, 
                price: Math.floor(Math.random() * 10000) + 1000, 
                change: Math.floor(Math.random() * 200) - 100, 
                changePercent: ((Math.random() * 4) - 2).toFixed(2),
                currency: '$'
            };
        }

        function getStockName(symbol) {
            const stockNames = {
                '7203': 'トヨタ自動車',
                '9984': 'ソフトバンクグループ',
                '6758': 'ソニーグループ',
                '9983': 'ファーストリテイリング',
                'AAPL': 'Apple Inc.',
                'GOOGL': 'Alphabet Inc.'
            };

            return stockNames[symbol] || symbol;
        }

        // エンターキーで検索
        document.getElementById('stockInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchStock();
            }
        });
    </script>
</body>
</html>
